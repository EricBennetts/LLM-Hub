<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM-Hub | 开发者社区讨论平台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
    <!-- 顶部导航栏 -->
    <header class="app-header">
        <div class="header-container">
            <router-link to="/" class="logo">
                <span class="logo-icon">🚀</span> LLM Hub
            </router-link>

            <nav class="header-nav">
                <div v-if="!loggedInUser" class="auth-buttons">
                    <button class="btn-text" @click="openLoginModal">登录</button>
                    <button class="btn-primary" @click="openRegistrationModal">加入我们</button>
                </div>
                <div v-else class="user-panel">
                    <!-- 欢迎信息 -->
                    <div class="welcome-message">
                        <span class="welcome-text">👋 欢迎，{{ loggedInUser.username }}</span>
                    </div>

                    <!-- 通知铃铛 -->
                    <div class="notification-wrapper">
                        <button class="icon-btn" @click="toggleNotificationDropdown" title="消息通知">
                            🔔 <span v-if="unreadCount > 0" class="badge">{{ unreadCount }}</span>
                        </button>
                        <div v-if="isNotificationDropdownVisible" class="dropdown-menu notification-dropdown">
                            <div class="dropdown-header">
                                <span>最新消息</span>
                            </div>
                            <div v-if="notifications.length === 0" class="empty-state">
                                <div style="font-size: 2rem; margin-bottom: 8px;">📭</div>
                                暂无新消息
                            </div>
                            <div class="notification-list">
                                <router-link v-for="n in notifications" :key="n.id"
                                             :to="'/posts/' + n.postId"
                                             @click="handleNotificationClick(n)"
                                             class="notification-item" :class="{ 'unread': !n.read }">
                                    <div class="n-content">{{ n.content }}</div>
                                    <div class="n-time">{{ formatTime(n.createTime) }}</div>
                                </router-link>
                            </div>
                        </div>
                    </div>

                    <router-link to="/my-posts" class="nav-link">我的创作</router-link>
                    <button class="btn-success" @click="openCreatePostModal">✨ 发布帖子</button>
                    <button class="btn-outline-danger" @click="logout">登出</button>
                </div>
            </nav>
        </div>
    </header>

    <main class="main-content">
        <div v-if="!loggedInUser" class="welcome-banner">
            👋 欢迎来到 LLM-Hub！登录后即可参与深度讨论并使用 AI 总结功能。
        </div>

        <router-view :key="routerViewKey"></router-view>
    </main>

    <!-- 登录弹窗 -->
    <div class="modal-overlay" v-if="isLoginModalVisible" @click.self="closeLoginModal">
        <div class="modal-card">
            <h2>欢迎回来</h2>
            <div class="form-group">
                <input type="text" v-model="loginUser.username" placeholder="用户名" @keyup.enter="handleLogin">
            </div>
            <div class="form-group">
                <input type="password" v-model="loginUser.password" placeholder="密码" @keyup.enter="handleLogin">
            </div>
            <button class="btn-primary btn-block" @click="handleLogin">立即登录</button>
            <p class="switch-prompt">还没有账号？<a @click="switchToRegisterModal">立即注册</a></p>
        </div>
    </div>

    <!-- 注册弹窗 -->
    <div class="modal-overlay" v-if="isRegistrationModalVisible" @click.self="closeRegistrationModal">
        <div class="modal-card">
            <h2>创建新账号</h2>
            <div class="form-group"><input type="text" v-model="newUser.username" placeholder="用户名"></div>
            <div class="form-group"><input type="email" v-model="newUser.email" placeholder="邮箱地址"></div>
            <div class="form-group"><input type="password" v-model="newUser.password" placeholder="设置密码"></div>
            <div class="form-group"><input type="password" v-model="newUser.confirmPassword" placeholder="确认密码"></div>
            <button class="btn-primary btn-block" @click="registerUser">注册</button>
        </div>
    </div>

    <!-- 发帖弹窗 -->
    <div class="modal-overlay" v-if="isCreatePostModalVisible" @click.self="closeCreatePostModal">
        <div class="modal-card wide">
            <h2>发布精彩内容</h2>
            <div class="form-group"><input type="text" v-model="newPost.title" placeholder="起一个吸引人的标题"></div>
            <div class="form-group"><textarea v-model="newPost.content" placeholder="分享你的见解..." rows="10"></textarea></div>
            <div class="modal-footer">
                <button class="btn-text" @click="closeCreatePostModal">取消</button>
                <button class="btn-primary" @click="handleCreatePost">发布帖子</button>
            </div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
